<title>Terrace — For the ones who stand at the back</title>

<link rel="stylesheet" href="assets/colors_and_type.css" />
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--paper); }
  body { font-family: var(--font-body); color: var(--fg1); -webkit-font-smoothing: antialiased; }
  a { -webkit-tap-highlight-color: transparent; }
  ::selection { background: var(--mustard-400); color: var(--ink); }

  /* scarf band sideways drift */
  @keyframes tcScarfDrift { from { background-position-x: 0; } to { background-position-x: var(--scarf-period); } }
  .scarf-anim { animation: tcScarfDrift var(--scarf-dur) linear infinite; }

  /* hero scarf tilt + gentle sway */
  .scarf-hero { transform: rotate(-1.2deg); }
  @keyframes tcSway { 0%,100% { transform: rotate(-1.4deg); } 50% { transform: rotate(-0.5deg); } }
  .scarf-sway { animation: tcSway 8s ease-in-out infinite; }

  /* club marquee */
  @keyframes tcMarquee { from { transform: translateX(0); } to { transform: translateX(-50%); } }
  .tc-marquee { animation: tcMarquee 42s linear infinite; will-change: transform; }
  .tc-marquee-rev { animation-direction: reverse; }

  /* hover life */
  .tc-card { transition: box-shadow .16s ease, transform .16s ease; }
  .tc-card:hover { box-shadow: var(--shadow-md); transform: translateY(-2px); }
  .tc-navlinks a { transition: color .14s ease; }
  .tc-navlinks a:hover { color: var(--claret-700); }

  @media (prefers-reduced-motion: reduce) {
    .scarf-anim, .scarf-sway, .tc-marquee { animation: none !important; }
  }

  /* responsive */
  @media (max-width: 900px) {
    .tc-grid-3 { grid-template-columns: 1fr 1fr !important; }
    .tc-map-grid { grid-template-columns: 1fr !important; gap: 36px !important; }
    .tc-foot-grid { grid-template-columns: 1fr 1fr !important; }
    .tc-navlinks { display: none !important; }
  }
  @media (max-width: 580px) {
    .tc-grid-3, .tc-grid-2 { grid-template-columns: 1fr !important; }
    .tc-foot-grid { grid-template-columns: 1fr !important; }
    .tc-stats { gap: 28px !important; }
  }
</style>
